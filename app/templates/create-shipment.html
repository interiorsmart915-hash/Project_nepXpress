<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Shipment - NepXpress</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='common.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='admin-dashboard.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='create-shipment.css') }}" />
</head>
<body>

  <!-- ── SIDEBAR: left navigation panel ── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="NepXpress" class="sidebar-logo" />
      <span class="sidebar-tagline">Logistics Management</span>
    </div>

    <nav class="sidebar-nav">
      <a href="/dashboard" class="nav-item">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="/create-shipment" class="nav-item active">
        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Create Delivery
      </a>
      <a href="/track-shipment" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Track Shipment
      </a>
      <a href="/shipment-history" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        History
      </a>
      <a href="/settings" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M8.46 8.46a5 5 0 0 0 0 7.07"/></svg>
        Settings
      </a>
    </nav>

    <!-- Logged-in user shown at the bottom of the sidebar -->
    <div class="sidebar-user">
      <div class="user-avatar">JD</div>
      <div class="user-info">
        <span class="user-name">John Doe</span>
        <span class="user-role">Customer</span>
      </div>
    </div>
  </aside>

  <!-- ── MAIN WRAPPER: topbar + content ── -->
  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-title">
        <h1>Create Delivery</h1>
        <p>Fill in the details to send a new package</p>
      </div>
      <button class="notif-btn">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-dot"></span>
      </button>
    </header>

    <main class="content">
      <!-- form-grid: 2-column layout; full-width cards span both columns -->
      <div class="form-grid">

        <!-- CARD 1: Who is sending the package -->
        <section class="card">
          <h2 class="card-title">Sender Information</h2>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="senderName" placeholder="Enter sender's full name" />
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="+977 98XXXXXXXX" />
          </div>
          <div class="form-group">
            <label>Pickup Address</label>
            <input type="text" placeholder="Street address, area" />
          </div>
          <!-- City and District side by side -->
          <div class="form-row">
            <div class="form-group">
              <label>City</label>
              <select>
                <option value="">Select city</option>
                <option>Kathmandu</option>
                <option>Lalitpur</option>
                <option>Bhaktapur</option>
                <option>Pokhara</option>
                <option>Chitwan</option>
              </select>
            </div>
            <div class="form-group">
              <label>District</label>
              <input type="text" placeholder="District" />
            </div>
          </div>
        </section>

        <!-- CARD 2: Who is receiving the package -->
        <section class="card">
          <h2 class="card-title">Receiver Information</h2>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="receiverName" placeholder="Enter receiver's full name" />
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="+977 98XXXXXXXX" />
          </div>
          <div class="form-group">
            <label>Delivery Address</label>
            <input type="text" placeholder="Street address, area" />
          </div>
          <!-- City and District side by side -->
          <div class="form-row">
            <div class="form-group">
              <label>City</label>
              <select>
                <option value="">Select city</option>
                <option>Kathmandu</option>
                <option>Lalitpur</option>
                <option>Bhaktapur</option>
                <option>Pokhara</option>
                <option>Chitwan</option>
              </select>
            </div>
            <div class="form-group">
              <label>District</label>
              <input type="text" placeholder="District" />
            </div>
          </div>
        </section>

        <!-- CARD 3: What is being sent (full width) -->
        <section class="card full-width">
          <h2 class="card-title">Package Details</h2>

          <!-- Row 1: type, weight, value -->
          <div class="form-row three-col">
            <div class="form-group">
              <label>Package Type</label>
              <select>
                <option value="">Select type</option>
                <option>Document</option>
                <option>Parcel</option>
                <option>Fragile</option>
                <option>Electronics</option>
                <option>Clothing</option>
                <option>Food</option>
              </select>
            </div>
            <div class="form-group">
              <label>Weight (kg)</label>
              <input type="number" placeholder="0.0" min="0" step="0.1" />
            </div>
            <div class="form-group">
              <label>Estimated Value (NPR)</label>
              <input type="number" placeholder="0" min="0" />
            </div>
          </div>

          <!-- Row 2: dimensions -->
          <div class="form-row three-col">
            <div class="form-group">
              <label>Length (cm)</label>
              <input type="number" placeholder="0" />
            </div>
            <div class="form-group">
              <label>Width (cm)</label>
              <input type="number" placeholder="0" />
            </div>
            <div class="form-group">
              <label>Height (cm)</label>
              <input type="number" placeholder="0" />
            </div>
          </div>

          <!-- Free text for any special handling notes -->
          <div class="form-group">
            <label>Special Instructions</label>
            <textarea placeholder="Handle with care, keep upright, etc."></textarea>
          </div>
        </section>

        <!-- CARD 4: Speed of delivery (full width) -->
        <section class="card full-width">
          <h2 class="card-title">Delivery Options</h2>
          <div class="delivery-options">
            <label class="option-card selected">
              <input type="radio" name="delivery" value="standard" checked />
              <div class="option-info">
                <div class="option-name">Standard Delivery</div>
                <div class="option-desc">2–4 business days</div>
              </div>
              <div class="option-price">NPR 150</div>
            </label>
            <label class="option-card">
              <input type="radio" name="delivery" value="express" />
              <div class="option-info">
                <div class="option-name">Express Delivery</div>
                <div class="option-desc">Same day delivery</div>
              </div>
              <div class="option-price">NPR 350</div>
            </label>
            <label class="option-card">
              <input type="radio" name="delivery" value="overnight" />
              <div class="option-info">
                <div class="option-name">Overnight Delivery</div>
                <div class="option-desc">Next morning by 9 AM</div>
              </div>
              <div class="option-price">NPR 500</div>
            </label>
          </div>
        </section>

        <!-- CARD 5: How the customer pays (full width) -->
        <section class="card full-width">
          <h2 class="card-title">Payment Method</h2>
          <div class="payment-options">
            <label class="payment-card selected">
              <input type="radio" name="payment" value="cod" checked />
              <span class="pay-icon">💵</span>
              <span>Cash on Delivery</span>
            </label>
            <label class="payment-card">
              <input type="radio" name="payment" value="esewa" />
              <span class="pay-icon">📱</span>
              <span>eSewa</span>
            </label>
            <label class="payment-card">
              <input type="radio" name="payment" value="khalti" />
              <span class="pay-icon">💳</span>
              <span>Khalti</span>
            </label>
            <label class="payment-card">
              <input type="radio" name="payment" value="bank" />
              <span class="pay-icon">🏦</span>
              <span>Bank Transfer</span>
            </label>
          </div>
        </section>

      </div>

      <!-- ── SUMMARY BAR: total price + action buttons ── -->
      <div class="summary-bar">
        <div class="summary-info">
          <div class="summary-label">Estimated Total</div>
          <div class="summary-amount">NPR 150</div>
        </div>
        <div class="summary-actions">
          <button class="btn-outline" id="saveDraftBtn">Save as Draft</button>
          <button class="btn-primary" id="confirmBtn">Confirm &amp; Create Shipment</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Floating help button, bottom-right corner -->
  <button class="help-btn">?</button>

  <!-- ── JAVASCRIPT ── -->
  <script>
    // Highlight whichever delivery speed the user clicks
    document.querySelectorAll('.option-card').forEach(function(card) {
      card.addEventListener('click', function() {
        document.querySelectorAll('.option-card').forEach(function(c) {
          c.classList.remove('selected');
        });
        card.classList.add('selected');
      });
    });

    // Highlight whichever payment method the user clicks
    document.querySelectorAll('.payment-card').forEach(function(card) {
      card.addEventListener('click', function() {
        document.querySelectorAll('.payment-card').forEach(function(c) {
          c.classList.remove('selected');
        });
        card.classList.add('selected');
      });
    });

    // Save draft — placeholder alert for now
    document.getElementById('saveDraftBtn').addEventListener('click', function() {
      alert('Shipment saved as draft!');
    });

    // Confirm — validate sender/receiver names before submitting
    document.getElementById('confirmBtn').addEventListener('click', function() {
      var senderName = document.getElementById('senderName').value;
      var receiverName = document.getElementById('receiverName').value;

      if (senderName === '' || receiverName === '') {
        alert('Please fill in sender and receiver names before submitting.');
        return;
      }

      alert('Shipment created successfully! Redirecting to history...');
      // window.location.href = '/shipment-history';
    });
  </script>

</body>
</html>
