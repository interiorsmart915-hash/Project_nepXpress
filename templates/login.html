{% extends "base_auth.html" %}

{% block title %}NepXpress – Login{% endblock %}

{% block extra_css %}
  <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}"/>
{% endblock %}

{% block content %}
<div class="card">
  <h1 class="heading">Welcome Back</h1>
  <p class="sub">Login to access your account</p>

  <div class="tabs">
    <span class="tab active">Login</span>
    <a href="{{ url_for('auth.register') }}" class="tab">Register</a>
  </div>

  <form method="POST" action="{{ url_for('auth.login') }}" name="login" id="loginForm">
    <div class="field">
      <label class="label" for="email">Email Address</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email"/>
      </div>
    </div>

    <div class="field">
      <label class="label" for="password">Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password"/>
      </div>
    </div>

    <div class="row" style="justify-content: flex-start;">
      <a href="{{ url_for('auth.forgot_password') }}" class="link-small">Forgot password?</a>
    </div>
    <button type="submit" class="btn">Login</button>
    <p class="foot">Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
  </form>
</div>
{% endblock %}
