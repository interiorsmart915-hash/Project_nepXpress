<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NexPress</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

         *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue-950:#020d1f;--blue-900:#061630;--blue-800:#0a2550;
      --blue-700:#0d3475;--blue-600:#1048a8;--blue-500:#1a5fd4;
      --blue-400:#3b82f6;--blue-300:#7ab3fa;--blue-100:#dbeafe;--blue-50:#eff6ff;
      --accent:#f59e0b;--accent-light:#fcd34d;--white:#ffffff;
      --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
      --gray-300:#d1d5db;--gray-500:#6b7280;--gray-700:#374151;--gray-900:#111827;
      --font-d:'Plus Jakarta Sans',sans-serif;--font-b:'Inter',sans-serif;
      --r-sm:8px;--r-md:16px;--r-lg:24px;
      --shadow:0 4px 24px rgba(10,37,80,.09);
      --shadow-h:0 16px 48px rgba(10,37,80,.17);
      --tr:.28s cubic-bezier(.4,0,.2,1);
    }
    html{scroll-behavior:smooth}
    body{font-family:var(--font-b);color:var(--gray-900);background:var(--white);
         line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
 
    /* ══ HERO ══════════════════════════════════════════════════════ */
    .hero{
      position:relative;min-height:100vh;display:flex;align-items:center;
      overflow:hidden;
      background:linear-gradient(160deg,var(--blue-950) 0%,var(--blue-800) 55%,var(--blue-700) 100%);
    }
    /* grid overlay */
    .hero::before{
      content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
      background-size:56px 56px;
    }
    .hero-glow{
      position:absolute;top:-20%;right:-10%;width:700px;height:700px;
      border-radius:50%;pointer-events:none;z-index:0;
      background:radial-gradient(circle,rgba(26,95,212,.22) 0%,transparent 65%);
    }
    .hero-inner{
      position:relative;z-index:2;max-width:1200px;margin:0 auto;width:100%;
      padding:130px 40px 200px;display:grid;grid-template-columns:1fr 1fr;
      gap:56px;align-items:center;
    }
 
    /* badge */
    .hero-badge{
      display:inline-flex;align-items:center;gap:8px;margin-bottom:24px;
      background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);
      color:var(--accent-light);font-size:11.5px;font-weight:700;
      letter-spacing:.13em;text-transform:uppercase;
      padding:5px 13px;border-radius:999px;
    }
    .hero-badge .dot{
      width:6px;height:6px;background:var(--accent);border-radius:50%;
      animation:blink 2s ease-in-out infinite;
    }
    @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
 
    .hero h1{
      font-family:var(--font-d);font-size:clamp(2.8rem,5.5vw,4.4rem);
      font-weight:800;color:var(--white);line-height:1.08;
      letter-spacing:-.025em;margin-bottom:8px;
    }
    .hero h1 .hl{
      background:linear-gradient(90deg,var(--blue-300),var(--accent-light));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .hero-sub{font-size:1.25rem;color:rgba(255,255,255,.6);margin-bottom:36px;letter-spacing:-.01em}
    .hero-desc{font-size:.97rem;color:rgba(255,255,255,.52);max-width:480px;margin-bottom:40px;line-height:1.75}
    .hero-cta{display:flex;gap:14px;flex-wrap:wrap}
 
    /* right col placeholder on desktop – scene spans full width */
    .hero-right-placeholder{display:none}
 
    /* ── ANIMATION SCENE ── */
    .hero-scene{
      position:absolute;bottom:0;left:0;right:0;height:170px;z-index:3;overflow:hidden;
    }
    .scene-svg{width:100%;height:170px;display:block}
 
    /* Truck slides left→right */
    @keyframes truckSlide{
      0%  {transform:translateX(-360px)}
      100%{transform:translateX(calc(100vw + 60px))}
    }
    .truck-g{animation:truckSlide 8s linear infinite}
 
    /* Wheel spin – CSS applied, transform-origin set per wheel via style attr */
    @keyframes wspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .wh{animation:wspin .85s linear infinite}
 
    /* Exhaust puffs */
    @keyframes pf1{0%{opacity:.65;transform:translate(0,0) scale(.5)}100%{opacity:0;transform:translate(-22px,-28px) scale(2.2)}}
    @keyframes pf2{0%{opacity:.5; transform:translate(0,0) scale(.4)}100%{opacity:0;transform:translate(-18px,-38px) scale(2.5)}}
    @keyframes pf3{0%{opacity:.4; transform:translate(0,0) scale(.3)}100%{opacity:0;transform:translate(-28px,-20px) scale(1.9)}}
    .pf1{animation:pf1 1.1s ease-out infinite}
    .pf2{animation:pf2 1.1s ease-out .38s infinite}
    .pf3{animation:pf3 1.1s ease-out .74s infinite}
 
    /* scroll cue */
    .scroll-cue{
      position:absolute;bottom:180px;left:50%;transform:translateX(-50%);
      z-index:4;display:flex;flex-direction:column;align-items:center;gap:6px;
      color:rgba(255,255,255,.3);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;
    }
    .scroll-bar{
      width:1px;height:36px;
      background:linear-gradient(to bottom,rgba(255,255,255,.3),transparent);
      animation:sdrop 1.8s ease-in-out infinite;
    }
    @keyframes sdrop{
      0%  {transform:scaleY(0);transform-origin:top;opacity:1}
      50% {transform:scaleY(1);transform-origin:top;opacity:1}
      51% {transform:scaleY(1);transform-origin:bottom;opacity:1}
      100%{transform:scaleY(0);transform-origin:bottom;opacity:0}
    }
 
    /* ══ BUTTONS ═══════════════════════════════════════════════════ */
    .btn-primary{
      display:inline-flex;align-items:center;gap:8px;
      background:linear-gradient(135deg,var(--blue-500),var(--blue-600));
      color:var(--white);font-family:var(--font-b);font-weight:600;font-size:.93rem;
      padding:13px 26px;border-radius:var(--r-sm);text-decoration:none;
      border:none;cursor:pointer;transition:all var(--tr);
      box-shadow:0 4px 20px rgba(26,95,212,.38);
    }
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(26,95,212,.52)}
    .btn-outline{
      display:inline-flex;align-items:center;gap:8px;
      background:rgba(255,255,255,.07);color:var(--white);
      font-family:var(--font-b);font-weight:600;font-size:.93rem;
      padding:13px 26px;border-radius:var(--r-sm);text-decoration:none;
      border:1px solid rgba(255,255,255,.18);cursor:pointer;
      transition:all var(--tr);backdrop-filter:blur(6px);
    }
    .btn-outline:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.35);transform:translateY(-2px)}
 
    /* ══ SHARED SECTION ════════════════════════════════════════════ */
    .eyebrow{
      display:inline-block;font-size:.72rem;font-weight:700;
      letter-spacing:.15em;text-transform:uppercase;color:var(--blue-500);margin-bottom:14px;
    }
    .section-title{
      font-family:var(--font-d);font-size:clamp(1.75rem,3.2vw,2.65rem);
      font-weight:800;color:var(--gray-900);line-height:1.15;
      letter-spacing:-.02em;margin-bottom:18px;
    }
    .section-sub{font-size:1rem;color:var(--gray-500);max-width:600px;line-height:1.75}
 
    /* ══ ABOUT ═════════════════════════════════════════════════════ */
    .about-section{padding:96px 40px;background:var(--white)}
    .about-grid{
      max-width:1200px;margin:0 auto;display:grid;
      grid-template-columns:1fr 1fr;gap:64px;align-items:center;
    }
    .about-visual{
      position:relative;border-radius:var(--r-lg);min-height:360px;
      display:flex;align-items:center;justify-content:center;overflow:hidden;
      background:linear-gradient(135deg,var(--blue-900),var(--blue-700));
    }
    .about-visual::before{
      content:'';position:absolute;inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
      background-size:40px 40px;
    }
    .about-icon-cluster{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:12px}
    .about-icon-main{font-size:5rem;animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    .about-tag{
      background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
      color:rgba(255,255,255,.8);font-size:.8rem;font-weight:600;
      padding:6px 16px;border-radius:999px;backdrop-filter:blur(8px);
    }
    .about-pills{display:flex;flex-wrap:wrap;gap:10px;margin-top:28px}
    .pill{
      display:inline-flex;align-items:center;gap:6px;background:var(--blue-50);
      color:var(--blue-600);font-size:.82rem;font-weight:600;
      padding:6px 14px;border-radius:999px;border:1px solid var(--blue-100);
    }
 
    /* ══ VISION ════════════════════════════════════════════════════ */
    .vision-section{padding:96px 40px;background:var(--gray-50)}
    .vision-inner{max-width:1200px;margin:0 auto}
    .vision-header{margin-bottom:52px}
    .vision-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
    .vision-card{
      background:var(--white);border:1px solid var(--gray-100);border-radius:var(--r-md);
      padding:40px 32px;box-shadow:var(--shadow);transition:all var(--tr);
      position:relative;overflow:hidden;
    }
    .vision-card::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,var(--blue-500),var(--blue-400));
      transform:scaleX(0);transition:transform var(--tr);transform-origin:left;
    }
    .vision-card:hover{box-shadow:var(--shadow-h);transform:translateY(-5px)}
    .vision-card:hover::after{transform:scaleX(1)}
    .vision-icon{
      width:52px;height:52px;border-radius:12px;margin-bottom:22px;
      background:linear-gradient(135deg,var(--blue-600),var(--blue-500));
      display:flex;align-items:center;justify-content:center;font-size:1.4rem;
      box-shadow:0 4px 16px rgba(26,95,212,.28);
    }
    .vision-card h3{font-family:var(--font-d);font-size:1.1rem;font-weight:700;color:var(--gray-900);margin-bottom:12px}
    .vision-card p{font-size:.9rem;color:var(--gray-500);line-height:1.72}
 
    /* ══ WHY ═══════════════════════════════════════════════════════ */
    .why-section{padding:96px 40px;background:var(--white)}
    .why-inner{max-width:1200px;margin:0 auto}
    .why-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-top:52px}
    .why-card{
      display:flex;gap:24px;align-items:flex-start;
      background:var(--white);border:1px solid var(--gray-100);
      border-radius:var(--r-md);padding:32px 28px;
      box-shadow:var(--shadow);transition:all var(--tr);
    }
    .why-card:hover{box-shadow:var(--shadow-h);transform:translateY(-4px);border-color:var(--blue-100)}
    .why-icon{
      flex-shrink:0;width:50px;height:50px;border-radius:12px;
      background:var(--blue-50);border:1px solid var(--blue-100);
      display:flex;align-items:center;justify-content:center;font-size:1.3rem;
      transition:all var(--tr);
    }
    .why-card:hover .why-icon{
      background:linear-gradient(135deg,var(--blue-600),var(--blue-500));
      border-color:transparent;transform:scale(1.08) rotate(-4deg);
    }
    .why-card h4{font-family:var(--font-d);font-size:1.05rem;font-weight:700;color:var(--gray-900);margin-bottom:8px}
    .why-card p{font-size:.88rem;color:var(--gray-500);line-height:1.7}
 
    /* ══ JOURNEY ═══════════════════════════════════════════════════ */
    .journey-section{
      padding:96px 40px;position:relative;overflow:hidden;
      background:linear-gradient(160deg,var(--blue-950) 0%,var(--blue-800) 100%);
    }
    .journey-section::before{
      content:'';position:absolute;inset:0;pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
      background-size:52px 52px;
    }
    .journey-inner{max-width:1100px;margin:0 auto;position:relative;z-index:1}
    .journey-section .eyebrow{color:var(--accent-light)}
    .journey-section .section-title{color:var(--white)}
    .journey-section .section-sub{color:rgba(255,255,255,.55);margin-top:6px}
    .journey-steps{
      display:grid;grid-template-columns:repeat(5,1fr);gap:0;
      margin-top:56px;position:relative;
    }
    .journey-steps::before{
      content:'';position:absolute;top:32px;left:10%;right:10%;
      height:2px;background:rgba(255,255,255,.1);z-index:0;
    }
    .journey-step{
      display:flex;flex-direction:column;align-items:center;
      text-align:center;position:relative;z-index:1;padding:0 8px;
    }
    .step-circle{
      width:64px;height:64px;border-radius:50%;
      background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);
      display:flex;align-items:center;justify-content:center;font-size:1.5rem;
      margin-bottom:20px;transition:all var(--tr);position:relative;
    }
    .journey-step.done  .step-circle{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.35)}
    .journey-step.active .step-circle{
      background:linear-gradient(135deg,var(--blue-500),var(--blue-400));
      border-color:transparent;
      box-shadow:0 0 0 6px rgba(26,95,212,.2),0 8px 24px rgba(26,95,212,.4);
    }
    .step-num{
      position:absolute;top:-8px;right:-8px;width:22px;height:22px;
      background:var(--blue-500);border-radius:50%;font-size:.65rem;font-weight:700;
      color:white;display:flex;align-items:center;justify-content:center;
      border:2px solid var(--blue-900);
    }
    .journey-step.done .step-num{background:var(--accent)}
    .step-title{font-family:var(--font-d);font-size:.92rem;font-weight:700;color:var(--white);margin-bottom:8px}
    .step-desc{font-size:.78rem;color:rgba(255,255,255,.45);line-height:1.6}
    .step-badge{
      display:inline-block;font-size:.65rem;font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;
      padding:3px 10px;border-radius:999px;margin-top:10px;
    }
    .badge-done  {background:rgba(245,158,11,.15);color:var(--accent-light);border:1px solid rgba(245,158,11,.3)}
    .badge-active{background:rgba(26,95,212,.25);color:var(--blue-300);border:1px solid rgba(59,130,246,.35)}
    .badge-future{background:rgba(255,255,255,.05);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.1)}
 
    /* ══ CTA ═══════════════════════════════════════════════════════ */
    .cta-section{padding:100px 40px;background:var(--white)}
    .cta-box{
      max-width:860px;margin:0 auto;text-align:center;position:relative;overflow:hidden;
      background:linear-gradient(135deg,var(--blue-900),var(--blue-700));
      border-radius:var(--r-lg);padding:72px 64px;
      box-shadow:0 24px 64px rgba(6,22,48,.35);
    }
    .cta-box::before{
      content:'';position:absolute;inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
      background-size:44px 44px;
    }
    .cta-box::after{
      content:'';position:absolute;top:-30%;right:-15%;
      width:400px;height:400px;border-radius:50%;pointer-events:none;
      background:radial-gradient(circle,rgba(26,95,212,.3),transparent 65%);
    }
    .cta-content{position:relative;z-index:1}
    .cta-emoji{font-size:3rem;margin-bottom:20px;display:block}
    .cta-box h2{
      font-family:var(--font-d);font-size:clamp(1.9rem,3.5vw,2.8rem);
      font-weight:800;color:var(--white);letter-spacing:-.02em;margin-bottom:16px;
    }
    .cta-box p{font-size:1rem;color:rgba(255,255,255,.6);max-width:500px;margin:0 auto 40px;line-height:1.7}
    .cta-buttons{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
    .btn-accent{
      display:inline-flex;align-items:center;gap:8px;
      background:linear-gradient(135deg,var(--accent),#d97706);
      color:var(--blue-950);font-family:var(--font-b);font-weight:700;font-size:.95rem;
      padding:15px 32px;border-radius:var(--r-sm);text-decoration:none;
      border:none;cursor:pointer;transition:all var(--tr);
      box-shadow:0 4px 20px rgba(245,158,11,.38);
    }
    .btn-accent:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(245,158,11,.52)}
    .btn-ghost{
      display:inline-flex;align-items:center;gap:8px;
      background:rgba(255,255,255,.08);color:var(--white);
      font-family:var(--font-b);font-weight:600;font-size:.95rem;
      padding:15px 32px;border-radius:var(--r-sm);text-decoration:none;
      border:1px solid rgba(255,255,255,.2);cursor:pointer;
      transition:all var(--tr);backdrop-filter:blur(6px);
    }
    .btn-ghost:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.38);transform:translateY(-2px)}
    .cta-note{margin-top:20px;font-size:.78rem;color:rgba(255,255,255,.35)}
 
    /* ══ FADE-UP ════════════════════════════════════════════════════ */
    .fade-up{opacity:0;transform:translateY(28px);transition:opacity .6s ease,transform .6s ease}
    .fade-up.visible{opacity:1;transform:translateY(0)}
 
    /* ══ RESPONSIVE ════════════════════════════════════════════════ */
    @media(max-width:1024px){
      .hero-inner{grid-template-columns:1fr}
      .vision-cards{grid-template-columns:1fr 1fr}
      .journey-steps{grid-template-columns:repeat(3,1fr);gap:24px}
      .journey-steps::before{display:none}
    }
    @media(max-width:768px){
      .about-section,.vision-section,.why-section,.journey-section,.cta-section{padding:64px 20px}
      .hero-inner{padding:100px 20px 210px}
      .about-grid{grid-template-columns:1fr}
      .about-visual{min-height:220px}
      .vision-cards,.why-grid{grid-template-columns:1fr}
      .journey-steps{grid-template-columns:repeat(2,1fr)}
      .cta-box{padding:48px 28px}
    }
    @media(max-width:480px){
      .journey-steps{grid-template-columns:1fr}
      .hero-cta{flex-direction:column}
    }
    </style>           
</head>
<body>

    <div class="container">

        {% block content %}
        <div class="container">

    

    <h1>Contact NepXpress</h1>

    <p>We're here to help with all your shipment and logistics needs.</p>

    <div>
        <h3>Email</h3>

        <h3>Phone</h3>

    </div>
