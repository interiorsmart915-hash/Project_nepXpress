<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NepXpress – Logout Confirmation</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}"/>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f7f8fa;
    }

    .logout-wrapper {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 20px;
      padding: 48px 52px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      animation: fadeUp 0.5s ease both;
      text-align: center;
    }

    .logout-icon {
      width: 90px;
      height: 90px;
      background: #fff0f0;
      border: 2px solid #e53e3e;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 0 auto 28px;
      font-size: 44px;
    }

    .logout-heading {
      font-size: 36px;
      font-weight: 900;
      color: #1a1f2e;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .logout-text {
      font-size: 16px;
      color: #8a93a8;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 28px;
    }

    .btn-cancel {
      height: 52px;
      background: #f2f4f8;
      color: #1a1f2e;
      border: 1.5px solid #e2e5eb;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-cancel:hover {
      background: #e8ecf4;
      border-color: #d0d4de;
    }

    .btn-logout {
      height: 52px;
      background: #c33;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: #b22;
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(204, 51, 51, 0.25);
    }

    .btn-logout:active {
      transform: scale(0.98);
    }

    /* Flash alerts */
    .alert {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 13px 22px;
      border-radius: 10px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      animation: alertFade 3s ease-out forwards;
      min-width: 320px;
      max-width: 500px;
      z-index: 1000;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .alert.alert-danger {
      background: #fee;
      color: #c33;
      border: 1px solid #c33;
    }

    .alert.alert-success {
      background: #efe;
      color: #2a7a2a;
      border: 1px solid #3c3;
    }

    .alert button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: inherit;
      padding: 0;
      line-height: 1;
    }

    @keyframes alertFade {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
      85%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-16px); pointer-events: none; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">
          <span>{{ message }}</span>
          <button onclick="this.parentElement.style.display='none';">×</button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <div class="logout-wrapper">

    <div class="logout-icon">⚠️</div>
    <h1 class="logout-heading">Logout?</h1>
    <p class="logout-text">Are you sure you want to logout?</p>

    <form method="POST" action="{{ url_for('logout') }}">
      <div class="button-group">
        <a href="{{ url_for('dashboard') }}" class="btn-cancel">No</a>
        <button type="submit" class="btn-logout">Yes</button>
      </div>
    </form>

  </div>

  <button class="help-btn" style="position:fixed;bottom:24px;right:24px;width:36px;height:36px;border-radius:50%;background:#e2e5eb;border:none;cursor:pointer;font-size:15px;font-weight:700;color:#8a93a8;">?</button>

</body>
</html>
