<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NepXpress – Logout Confirmation</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='logout.css') }}"/>
</head>
<body>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">
          <span>{{ message }}</span>
          <button onclick="this.parentElement.style.display='none';">×</button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <div class="logout-wrapper">

    <div class="logout-icon">⚠️</div>
    <h1 class="logout-heading">Logout?</h1>
    <p class="logout-text">Are you sure you want to logout?</p>

    <form method="POST" action="{{ url_for('user.logout') }}">
      <div class="button-group">
        <a href="{{ url_for('user.dashboard') }}" class="btn-cancel">No</a>
        <button type="submit" class="btn-logout">Yes</button>
      </div>
    </form>

  </div>

</body>
</html>
